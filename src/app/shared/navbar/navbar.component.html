<!-- src/app/shared/navbar/navbar.component.html -->
<nav class="navbar">
  <div class="navbar-inner">

    <!-- Logo -->
    <a class="logo" routerLink="/mountain">
      <span class="logo-ry">Ry</span><span class="logo-dex">dex</span>
    </a>

    <!-- Nav Links -->
    <ul class="nav-links">
      @for (link of navLinks; track link.path) {
        <li>
          <a [routerLink]="link.path"
             routerLinkActive="active"
             class="nav-link">
            {{ link.label }}
          </a>
        </li>
      }
    </ul>

    <!-- Actions -->
    <div class="nav-actions">

      <!-- Search -->
      <div class="search-wrap" [class.open]="showSearch()">
        @if (showSearch()) {
          <input
            class="search-input"
            type="text"
            placeholder="Search gallery..."
            [ngModel]="searchQuery()"
            (ngModelChange)="searchQuery.set($event)"
            (keydown.enter)="submitSearch()"
            autofocus />
        }
        <button class="icon-btn" (click)="toggleSearch()" title="Search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
        </button>
      </div>

      <!-- Dark mode toggle -->
      <button class="icon-btn" (click)="theme.toggle()" title="Toggle theme">
        @if (theme.isDark()) {
          <!-- Sun icon -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        } @else {
          <!-- Moon icon -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        }
      </button>

      <!-- Cart button -->
      <button class="icon-btn cart-btn" (click)="goToCart()" title="Cart">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="21" r="1"/>
            <circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        @if (cart.totalItems() > 0) {
            <span class="cart-badge">{{ cart.totalItems() }}</span>
        }
     </button>

      <!-- Login / User -->
      @if (auth.isLoggedIn) {
        @if (auth.cliente()?.rol === 'ADMIN') {
          <a routerLink="/admin/dashboard" class="btn-outline btn-sm">
            Admin
          </a>
        }
        <span class="nav-user-name">{{ auth.cliente()?.nombre?.split(' ')?.[0] }}</span>
        <button class="btn-outline btn-sm" (click)="auth.logout()">
          Salir
        </button>
      } @else {
        <a routerLink="/login" class="btn-primary btn-sm">
          Login
        </a>
      }
    </div>

  </div>
</nav>
