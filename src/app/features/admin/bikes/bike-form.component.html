<!-- src/app/features/admin/bikes/bike-form.component.html -->
<div class="admin-page">
  <div class="page-header">
    <div>
      <h1 class="page-title">{{ isEdit ? 'Editar bicicleta' : 'Nueva bicicleta' }}</h1>
      <p class="page-sub">{{ isEdit ? 'Modifica los datos del producto' : 'Agrega un nuevo producto al catálogo' }}</p>
    </div>
    <a routerLink="/admin/bicicletas" class="btn-secondary">← Volver</a>
  </div>

  @if (error()) {
    <div class="alert alert-error">{{ error() }}</div>
  }

  @if (loading()) {
    <div class="form-card">
      <div class="form-grid">
        @for (i of [1,2,3,4,5,6]; track i) {
          <div class="row-skeleton" style="height:64px; border-radius:8px;"></div>
        }
      </div>
    </div>
  } @else {
    <div class="form-card">
      <div class="form-grid">

        <div class="form-group">
          <label class="form-label">SKU *</label>
          <input class="form-input" type="text" placeholder="MTB-001"
                 [ngModel]="form().sku"
                 (ngModelChange)="updateField('sku', $event)" />
        </div>

        <div class="form-group">
          <label class="form-label">Tipo *</label>
          <select class="form-select"
                  [ngModel]="form().tipo"
                  (ngModelChange)="updateField('tipo', $event)">
            @for (tipo of tipos; track tipo) {
              <option [value]="tipo">{{ tipo }}</option>
            }
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">Marca *</label>
          <input class="form-input" type="text" placeholder="Trek"
                 [ngModel]="form().marca"
                 (ngModelChange)="updateField('marca', $event)" />
        </div>

        <div class="form-group">
          <label class="form-label">Modelo *</label>
          <input class="form-input" type="text" placeholder="Summit Trail Pro X"
                 [ngModel]="form().modelo"
                 (ngModelChange)="updateField('modelo', $event)" />
        </div>

        <div class="form-group">
          <label class="form-label">Precio (USD) *</label>
          <input class="form-input" type="number" min="0" step="0.01"
                 [ngModel]="form().precio"
                 (ngModelChange)="updateField('precio', +$event)" />
        </div>

        <div class="form-group">
          <label class="form-label">Stock actual</label>
          <input class="form-input" type="number" min="0"
                 [ngModel]="form().stock_actual"
                 (ngModelChange)="updateField('stock_actual', +$event)" />
        </div>

        <div class="form-group">
          <label class="form-label">Stock mínimo</label>
          <input class="form-input" type="number" min="0"
                 [ngModel]="form().stock_minimo"
                 (ngModelChange)="updateField('stock_minimo', +$event)" />
        </div>

        <div class="form-group full">
          <label class="form-label">Descripción</label>
          <textarea class="form-textarea" rows="3"
                    placeholder="Describe el producto..."
                    [ngModel]="form().descripcion"
                    (ngModelChange)="updateField('descripcion', $event)"></textarea>
        </div>

      </div>

      <div class="form-actions">
        <button class="btn-primary" (click)="save()" [disabled]="saving()">
          @if (saving()) { Guardando... } @else { {{ isEdit ? 'Guardar cambios' : 'Crear bicicleta' }} }
        </button>
        <a routerLink="/admin/bicicletas" class="btn-secondary">Cancelar</a>
      </div>
    </div>
  }
</div>
